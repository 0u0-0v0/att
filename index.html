<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>출석 관리 시스템🍀</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="출결관리">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5663/5123119.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal; font-display: swap;
        }
        * { font-family: 'OngleipParkDahyeon', sans-serif !important; -webkit-font-smoothing: antialiased; }
        body { background-color: #fdf2f8; margin: 0; -webkit-tap-highlight-color: transparent; }
        .soft-card { background: white; border-radius: 2rem; border: 2px solid #fff; box-shadow: 0 8px 20px rgba(244, 114, 182, 0.1); }
        .bubble-btn { background: #ff4d6d; color: white; border-radius: 2rem; transition: 0.2s; border-bottom: 4px solid rgba(0,0,0,0.1); }
        .bubble-btn:active { transform: scale(0.96); border-bottom-width: 0; }
        .loader { width: 20px; height: 20px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // 서비스 워커 등록 (PWA 필수)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqkfbtpB_OBD8SrmkICxyeHTWoPXZ4cdpPe9AoyJQNQL7679SxGXh7xYCgu1laEsHA/exec";

        function App() {
            // [해결3] 접속 시 ID 기억 로직
            const [appId] = useState(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const idFromUrl = urlParams.get('id');
                if (idFromUrl) {
                    localStorage.setItem('saved_attendance_id', idFromUrl);
                    return idFromUrl;
                }
                return localStorage.getItem('saved_attendance_id') || 'default';
            });

            const [view, setView] = useState('checkin');
            const [isLoading, setIsLoading] = useState(false);
            const [config, setConfig] = useState({ id: appId, className: '로딩 중...', passcode: '0000' });
            const [studentId, setStudentId] = useState('');
            const [studentName, setStudentName] = useState('');
            const [reason, setReason] = useState('');

            useEffect(() => {
                fetch(`${GOOGLE_SCRIPT_URL}?id=${appId}`)
                    .then(res => res.json())
                    .then(data => { if(!data.error) setConfig(data); });
            }, [appId]);

            const handleCheckIn = async (e) => {
                e.preventDefault();
                if (!config.formUrl) return alert('설정에서 구글 폼 주소를 먼저 저장해주세요!');
                setIsLoading(true);

                try {
                    // [해결1] 빈 내용 전송 문제 해결 로직
                    let actionUrl = config.formUrl.trim().split('?')[0];
                    actionUrl = actionUrl.replace('/viewform', '/formResponse');

                    const params = new URLSearchParams();
                    const toEntry = (num) => `entry.${String(num).replace('entry.', '')}`;

                    params.append(toEntry(config.studentIdEntry), studentId);
                    params.append(toEntry(config.nameEntry), studentName);
                    if(config.reasonEntry) params.append(toEntry(config.reasonEntry), reason);

                    // 구글 폼으로 데이터 발사!
                    await fetch(actionUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: params.toString()
                    });

                    alert(`${studentName}님, 출석이 완료되었습니다! ✨`);
                    setStudentId(''); setStudentName(''); setReason('');
                } catch (err) {
                    alert('전송 중 오류가 발생했습니다. 네트워크를 확인하세요.');
                }
                setIsLoading(false);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 flex flex-col gap-6">
                    <header className="text-center py-10">
                        <h1 className="text-3xl font-bold text-[#ff4d6d] drop-shadow-sm">{config.className}</h1>
                        <p className="text-pink-300 text-sm mt-2">ID: {appId}</p>
                    </header>

                    <main className="flex-grow space-y-4">
                        <form onSubmit={handleCheckIn} className="space-y-4">
                            <input className="w-full p-5 soft-card text-xl font-bold focus:border-pink-300 outline-none" placeholder="학번 입력" value={studentId} onChange={e=>setStudentId(e.target.value)} required />
                            <input className="w-full p-5 soft-card text-xl font-bold focus:border-pink-300 outline-none" placeholder="이름 입력" value={studentName} onChange={e=>setStudentName(e.target.value)} required />
                            <textarea className="w-full p-5 soft-card h-32 font-bold outline-none" placeholder="사유 (선택사항)" value={reason} onChange={e=>setReason(e.target.value)} />
                            <button className="w-full p-5 bubble-btn font-bold text-xl shadow-lg flex justify-center items-center" disabled={isLoading}>
                                {isLoading ? <span className="loader mr-2"></span> : '출석 체크하기! 🐾'}
                            </button>
                        </form>
                    </main>

                    <nav className="flex justify-around p-4 soft-card bg-white/80 backdrop-blur">
                        <button onClick={()=>setView('checkin')} className="text-2xl">🏠</button>
                        <button onClick={()=>{
                            const p = prompt('비밀번호를 입력하세요.');
                            if(p === config.passcode) alert('설정 변경은 PC 브라우저에서 ID를 붙여 접속 후 진행해 주세요!');
                        }} className="text-2xl">⚙️</button>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
