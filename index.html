<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출석 관리 시스템🍀</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 요청하신 폰트 적용 */
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal; font-display: swap;
        }
        :root { --primary: #ff85a1; --bg: #fdf2f8; }
        * { font-family: 'OngleipParkDahyeon', sans-serif !important; letter-spacing: -0.02em; }
        
        body {
            background-color: var(--bg);
            background-image: linear-gradient(#f9a8d415 1px, transparent 1px), linear-gradient(90deg, #f9a8d415 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #loading-screen {
            position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .loading-bar-container { width: 150px; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; margin-top: 20px; }
        .loading-bar { width: 100%; height: 100%; background: var(--primary); animation: loading-progress 2s infinite ease-in-out; transform-origin: left; }
        @keyframes loading-progress { 0% { transform: scaleX(0); } 50% { transform: scaleX(1); } 100% { transform: scaleX(0); transform-origin: right; } }

        .soft-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-radius: 2.5rem; box-shadow: 0 12px 30px -5px rgba(244, 114, 182, 0.15); border: 2px solid white; }
        .bubble-btn { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-bottom: 4px solid rgba(0,0,0,0.1); }
        .bubble-btn:active { transform: scale(0.96) translateY(2px); border-bottom-width: 1px; }
    </style>
</head>
<body class="antialiased">
    <div id="loading-screen">
        <div class="text-rose-400 text-6xl mb-6 floating">†</div> 
        <div class="text-rose-500 font-bold text-2xl tracking-tighter">정보를 불러오는 중입니다..</div>
        <div class="loading-bar-container"><div class="loading-bar"></div></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxn5eeJ3qsdj0xDbJRQQgVtR9Thgbe6V3_YPcHHkdnaBfwHREaFmvigx_LLeK7G9YKI/exec";

        function App() {
            const [appId, setAppId] = useState(new URLSearchParams(window.location.search).get('id') || 'default');
            const [view, setView] = useState('checkin'); 
            const [isLoading, setIsLoading] = useState(false);
            const [isConfigLoading, setIsConfigLoading] = useState(true);
            const [currentTime, setCurrentTime] = useState(new Date());
            
            const [showPassModal, setShowPassModal] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [passError, setPassError] = useState(false);
            const [showConfigPass, setShowConfigPass] = useState(false);
            const [historyData, setHistoryData] = useState(null);

            const [config, setConfig] = useState({
                id: appId, className: '', formUrl: '', passcode: '0000',
                studentIdEntry: '', nameEntry: '', reasonEntry: '', responseSheetId: ''
            });
            const [studentId, setStudentId] = useState('');
            const [studentName, setStudentName] = useState('');
            const [reason, setReason] = useState('');
            const [msg, setMsg] = useState({ type: '', text: '' });

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // 불러오기가 성공했던 로직 복구
            useEffect(() => {
                fetchConfig();
            }, [appId]);

            const fetchConfig = () => {
                setIsConfigLoading(true);
                // 과거에 성공했던 파라미터 구조 (?id=...) 유지
                fetch(`${GOOGLE_SCRIPT_URL}?id=${appId}&t=${Date.now()}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && (data.className || data.id)) {
                            setConfig({
                                id: String(data.id || appId),
                                className: String(data.className || ''),
                                formUrl: String(data.formUrl || ''),
                                passcode: String(data.passcode || '0000'),
                                studentIdEntry: String(data.studentIdEntry || ''),
                                nameEntry: String(data.nameEntry || ''),
                                reasonEntry: String(data.reasonEntry || ''),
                                responseSheetId: String(data.responseSheetId || '')
                            });
                            // 데이터 로딩 성공 시 로딩 화면 제거
                            const loader = document.getElementById('loading-screen');
                            if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 500); }
                        } else {
                            setConfig(prev => ({ ...prev, id: appId }));
                            // 데이터가 없어도 화면은 띄워줌
                            const loader = document.getElementById('loading-screen');
                            if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 500); }
                        }
                    })
                    .catch(() => {
                        const loader = document.getElementById('loading-screen');
                        if (loader) loader.remove();
                    })
                    .finally(() => setIsConfigLoading(false));
            };

            const showToast = (type, text) => {
                setMsg({ type, text });
                setTimeout(() => setMsg({ type: '', text: '' }), 3000);
            };

            const handleSaveSettings = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(config) });
                    showToast('success', '설정이 저장되었습니다! ✨');
                    setTimeout(fetchConfig, 1000); // 1초 뒤 동기화
                } catch (err) { alert('저장 실패'); }
                finally { setIsLoading(false); }
            };

            // 입력이 잘 되었던 로직 유지
            const handleCheckIn = async (e) => {
                e.preventDefault();
                if (!config.formUrl) return alert('설정에서 폼 주소를 입력해주세요.');
                setIsLoading(true);
                try {
                    let baseUrl = config.formUrl.split('?')[0].replace('/viewform', '/formResponse').replace('/edit', '/formResponse');
                    const getEntryKey = (val) => {
                        let s = String(val).trim();
                        return s.startsWith('entry.') ? s : `entry.${s}`;
                    };
                    const params = new URLSearchParams();
                    params.append(getEntryKey(config.studentIdEntry), studentId);
                    params.append(getEntryKey(config.nameEntry), studentName);
                    if (config.reasonEntry) params.append(getEntryKey(config.reasonEntry), reason);

                    await fetch(baseUrl, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: params.toString()
                    });
                    showToast('success', `${studentName}님, 출석 완료!`);
                    setStudentId(''); setStudentName(''); setReason('');
                } catch (err) { showToast('error', '전송 실패'); }
                finally { setIsLoading(false); }
            };

            const fetchHistory = (e) => {
                e.preventDefault();
                if (!studentId || !studentName) return alert('정보를 입력하세요.');
                setIsLoading(true);
                setHistoryData(null);
                fetch(`${GOOGLE_SCRIPT_URL}?type=history&appId=${appId}&studentId=${studentId}&studentName=${studentName}&t=${Date.now()}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) showToast('error', data.error);
                        else setHistoryData(data.history || []);
                    })
                    .finally(() => setIsLoading(false));
            };

            const copyShareLink = () => {
                const url = `${window.location.origin}${window.location.pathname}?id=${appId}`;
                const temp = document.createElement('input'); temp.value = url; document.body.appendChild(temp);
                temp.select(); document.execCommand('copy'); document.body.removeChild(temp);
                showToast('success', '주소가 복사되었습니다! ✨');
            };

            if (isConfigLoading && !config.className) return null;

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative bg-[#fdf2f8]/40 border-x border-pink-100 pb-32">
                    {msg.text && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[200] w-[85%] max-w-xs animate-in slide-in-from-top duration-500">
                            <div className={`p-4 rounded-[1.5rem] text-center font-bold text-sm shadow-2xl border-2 ${msg.type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-rose-50 text-rose-700 border-rose-100'}`}>
                                {msg.text}
                            </div>
                        </div>
                    )}

                    <div className="absolute top-20 left-6 text-3xl opacity-10 floating">♤</div>
                    <div className="absolute bottom-80 left-10 text-3xl opacity-10 floating">†</div>

                    <header className="px-8 pt-16 pb-6 text-center">
                        <div className="inline-block px-8 py-3 rounded-full bg-white shadow-sm border border-pink-100 mb-4 transform -rotate-1">
                            <h1 className="text-2xl font-bold text-pink-500 flex items-center gap-2">
                                <span>£</span> {config.className || "학급 정보 로드 중.."} <span>¢</span>
                            </h1>
                        </div>
                        <p className="text-[10px] font-bold text-pink-300">ID: {appId}</p>
                    </header>

                    <main className="p-6 flex-grow overflow-y-auto">
                        {view === 'checkin' ? (
                            <div className="space-y-6">
                                <div className="soft-card p-6 text-center">
                                    <div className="text-5xl font-bold text-slate-700 mb-2 tabular-nums">
                                        {currentTime.toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'})}
                                    </div>
                                    <div className="text-pink-400 text-xs font-bold uppercase tracking-widest">♤ Realtime System ♧</div>
                                </div>
                                <form onSubmit={handleCheckIn} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-sm font-bold text-slate-500 ml-4 flex items-center gap-2"><span className="text-pink-400">†</span> 학번</label>
                                        <input className="w-full p-5 rounded-[2rem] border-2 border-white bg-white/70 focus:bg-white focus:border-pink-300 outline-none font-bold text-xl shadow-sm text-slate-700" placeholder="예: 30521" value={studentId} onChange={e=>setStudentId(e.target.value)} required />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-sm font-bold text-slate-500 ml-4 flex items-center gap-2"><span className="text-pink-400">£</span> 성명</label>
                                        <input className="w-full p-5 rounded-[2rem] border-2 border-white bg-white/70 focus:bg-white focus:border-pink-300 outline-none font-bold text-xl shadow-sm text-slate-700" placeholder="성명을 입력하십시오" value={studentName} onChange={e=>setStudentName(e.target.value)} required />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-sm font-bold text-slate-500 ml-4 flex items-center gap-2"><span className="text-pink-400">¢</span> 사유 입력</label>
                                        <textarea className="w-full p-5 rounded-[2rem] border-2 border-white bg-white/70 focus:bg-white focus:border-pink-300 outline-none font-bold min-h-[120px] resize-none shadow-sm text-slate-700" placeholder="지각 조퇴 결석 시 사유를 입력하세요" value={reason} onChange={e=>setReason(e.target.value)} />
                                    </div>
                                    <button disabled={isLoading} className="bubble-btn w-full bg-pink-400 hover:bg-pink-500 text-white font-bold py-5 rounded-[2.5rem] shadow-xl text-xl mt-4">
                                        {isLoading ? <i className="fa-solid fa-spinner animate-spin"></i> : "출석 완료하기"}
                                    </button>
                                </form>
                            </div>
                        ) : view === 'history' ? (
                            <div className="space-y-6 animate-in slide-in-from-right">
                                <h2 className="text-2xl font-bold text-pink-500 text-center">🐾 출석 내역 조회</h2>
                                <form onSubmit={fetchHistory} className="soft-card p-6 space-y-4">
                                    <input className="w-full p-4 rounded-2xl border-2 border-pink-50 font-bold" placeholder="학번" value={studentId} onChange={e=>setStudentId(e.target.value)} required />
                                    <input className="w-full p-4 rounded-2xl border-2 border-pink-50 font-bold" placeholder="성명" value={studentName} onChange={e=>setStudentName(e.target.value)} required />
                                    <button className="w-full bg-pink-400 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2">기록 조회하기</button>
                                </form>
                                {historyData && (
                                    <div className="space-y-3 pb-10">
                                        {historyData.length > 0 ? historyData.map((h, i) => (
                                            <div key={i} className="soft-card p-5 flex justify-between items-center border-l-8 border-pink-200">
                                                <div><p className="text-[10px] text-slate-400 font-bold">{h.date}</p><p className="font-bold text-slate-700 text-lg">{h.reason ? `📝 ${h.reason}` : "✅ 정상 출석"}</p></div>
                                                <span className="text-3xl text-pink-100">♤</span>
                                            </div>
                                        )) : <p className="text-center py-20 font-bold text-slate-400">기록이 없습니다.</p>}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-5 animate-in slide-in-from-bottom">
                                <div className="flex justify-between items-center bg-white p-5 rounded-3xl border border-pink-100 shadow-sm">
                                    <h2 className="text-lg font-bold text-pink-500 flex items-center gap-2"><i className="fa-solid fa-sliders"></i> 환경 설정</h2>
                                    <button onClick={copyShareLink} className="bubble-btn text-xs bg-pink-50 text-pink-500 px-5 py-2 rounded-full font-bold">주소 복사</button>
                                </div>
                                <form onSubmit={handleSaveSettings} className="soft-card p-6 space-y-5">
                                    <div className="space-y-4">
                                        <input className="w-full p-3 border-b-2 border-pink-50 outline-none font-bold" placeholder="학급 명칭" value={config.className} onChange={e=>setConfig({...config, className:e.target.value})} required />
                                        <input className="w-full p-3 border-b-2 border-pink-50 outline-none text-xs font-bold" placeholder="구글 폼 URL" value={config.formUrl} onChange={e=>setConfig({...config, formUrl:e.target.value})} required />
                                        <input className="w-full p-3 border-b-2 border-pink-50 outline-none text-[10px] font-bold" placeholder="응답 시트 ID" value={config.responseSheetId} onChange={e=>setConfig({...config, responseSheetId:e.target.value})} />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input className="w-full p-3 border-b-2 border-pink-50 outline-none font-bold" placeholder="학번 ID" value={config.studentIdEntry} onChange={e=>setConfig({...config, studentIdEntry:e.target.value})} required />
                                            <input className="w-full p-3 border-b-2 border-pink-50 outline-none font-bold" placeholder="이름 ID" value={config.nameEntry} onChange={e=>setConfig({...config, nameEntry:e.target.value})} required />
                                        </div>
                                        <input className="w-full p-3 border-b-2 border-pink-50 outline-none font-bold" placeholder="사유 ID" value={config.reasonEntry} onChange={e=>setConfig({...config, reasonEntry:e.target.value})} />
                                        <div className="relative">
                                            <input type={showConfigPass ? "text" : "password"} className="w-full p-3 border-b-2 border-pink-100 outline-none font-bold pr-12" placeholder="관리 비번" value={config.passcode} onChange={e=>setConfig({...config, passcode:e.target.value})} required />
                                            <button type="button" onClick={()=>setShowConfigPass(!showConfigPass)} className="absolute right-2 bottom-3 text-pink-300 p-2"><i className={`fa-solid ${showConfigPass ? 'fa-eye-slash' : 'fa-eye'}`}></i></button>
                                        </div>
                                    </div>
                                    <button disabled={isLoading} className="bubble-btn w-full bg-slate-700 text-white font-bold py-5 rounded-[1.5rem] mt-4">설정 저장하기</button>
                                </form>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-white/90 backdrop-blur-xl border border-pink-100 flex justify-around p-3 rounded-[3rem] shadow-2xl z-50">
                        <button onClick={()=>setView('checkin')} className={`flex flex-col items-center gap-1 py-2 px-5 rounded-2xl ${view==='checkin' ? 'text-pink-500 scale-110 font-bold' : 'text-slate-300'}`}><span className="text-2xl mb-1">🐾</span><span className="text-[10px] font-bold">출석하기</span></button>
                        <button onClick={()=>setView('history')} className={`flex flex-col items-center gap-1 py-2 px-5 rounded-2xl ${view==='history' ? 'text-pink-500 scale-110 font-bold' : 'text-slate-300'}`}><span className="text-2xl mb-1">🔍</span><span className="text-[10px] font-bold">조회하기</span></button>
                        <button onClick={()=>{ setPassInput(''); setPassError(false); setShowPassModal(true); }} className={`flex flex-col items-center gap-1 py-2 px-5 rounded-2xl ${view==='settings' ? 'text-pink-500 scale-110 font-bold' : 'text-slate-300'}`}><span className="text-2xl mb-1">⚙️</span><span className="text-[10px] font-bold">환경설정</span></button>
                    </nav>

                    {showPassModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-pink-900/20 backdrop-blur-md">
                            <div className="soft-card w-full max-w-xs p-10 text-center animate-in zoom-in duration-300">
                                <h3 className="text-xl font-bold text-slate-700 mb-8 font-bold">비밀번호 확인</h3>
                                <form onSubmit={(e)=>{ e.preventDefault(); if(String(passInput).trim() === String(config.passcode).trim()){ setShowPassModal(false); setView('settings'); }else{ setPassError(true); setPassInput(''); } }}>
                                    <input type="password" autoFocus className={`w-full p-4 rounded-2xl border-2 outline-none text-center text-3xl font-bold transition-all ${passError ? 'border-rose-400 bg-rose-50 animate-bounce' : 'border-pink-50'}`} value={passInput} onChange={(e)=>{setPassInput(e.target.value); setPassError(false);}} />
                                    <div className="grid grid-cols-2 gap-4 mt-6">
                                        <button type="button" onClick={()=>setShowPassModal(false)} className="p-4 rounded-2xl bg-slate-100 font-bold text-slate-500">취소</button>
                                        <button type="submit" className="p-4 rounded-2xl bg-pink-400 text-white font-bold">확인</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
