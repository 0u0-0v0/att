<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출석 관리 시스템🍀</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 온글잎 박다현체 적용 */
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal; font-display: swap;
        }
        :root { --primary: #ff85a1; --bg: #fdf2f8; }
        * { font-family: 'OngleipParkDahyeon', sans-serif !important; letter-spacing: -0.02em; }
        
        body {
            background-color: var(--bg);
            background-image: linear-gradient(#f9a8d415 1px, transparent 1px), linear-gradient(90deg, #f9a8d415 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .soft-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 2.5rem; border: 2px solid white; box-shadow: 0 10px 25px -5px rgba(244, 114, 182, 0.1); }
        .bubble-btn { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-bottom: 4px solid rgba(0,0,0,0.1); }
        .bubble-btn:active { transform: scale(0.96) translateY(2px); border-bottom-width: 1px; }
        
        .loader { width: 40px; height: 40px; border: 4px solid #ff85a1; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body class="antialiased text-slate-700">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // 선생님의 새로운 앱스 스크립트 실행 URL
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQAi-WJ6rFhbJCCedPsLBNJG0milzi3yY_umdCuv2zaPrJgZlBqg7Vu1EUM3Q61atE/exec";

        function App() {
            const [appId] = useState(new URLSearchParams(window.location.search).get('id') || 'default');
            const [view, setView] = useState('checkin'); 
            const [isLoading, setIsLoading] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            
            const [showPassModal, setShowPassModal] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [passError, setPassError] = useState(false);
            const [historyData, setHistoryData] = useState(null);

            const [config, setConfig] = useState({
                id: appId, className: '', formUrl: '', passcode: '0000',
                studentIdEntry: '', nameEntry: '', reasonEntry: '', responseSheetId: ''
            });
            const [studentId, setStudentId] = useState('');
            const [studentName, setStudentName] = useState('');
            const [reason, setReason] = useState('');
            const [msg, setMsg] = useState({ type: '', text: '' });

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                fetchConfig();
                return () => clearInterval(timer);
            }, [appId]);

            const fetchConfig = () => {
                fetch(`${GOOGLE_SCRIPT_URL}?id=${appId}&t=${Date.now()}`)
                    .then(res => res.json())
                    .then(data => { if (data && !data.error) setConfig(prev => ({ ...prev, ...data })); })
                    .catch(err => console.error("설정 로드 실패", err));
            };

            const showToast = (type, text) => {
                setMsg({ type, text });
                setTimeout(() => setMsg({ type: '', text: '' }), 3000);
            };

            const handleSaveSettings = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify({ ...config, id: appId }) 
                    });
                    showToast('success', '설정이 저장되었습니다! ✨');
                    setTimeout(fetchConfig, 1000); 
                } catch (err) { alert('저장 중 오류 발생'); }
                finally { setIsLoading(false); }
            };

            const handleCheckIn = async (e) => {
                e.preventDefault();
                if (!config.formUrl) return alert('설정에서 구글 폼 URL을 먼저 입력해주세요!');
                setIsLoading(true);
                try {
                    let baseUrl = config.formUrl.split('?')[0].replace('/viewform', '/formResponse').replace('/edit', '/formResponse');
                    const params = new URLSearchParams();
                    const getEntryKey = (val) => String(val).startsWith('entry.') ? val : `entry.${val}`;
                    
                    params.append(getEntryKey(config.studentIdEntry), studentId);
                    params.append(getEntryKey(config.nameEntry), studentName);
                    if (config.reasonEntry) params.append(getEntryKey(config.reasonEntry), reason);

                    await fetch(baseUrl, { method: 'POST', mode: 'no-cors', body: params.toString() });
                    showToast('success', `${studentName}님, 출석 완료! 🐾`);
                    setStudentId(''); setStudentName(''); setReason('');
                } catch (err) { showToast('error', '전송 실패! 설정을 확인하세요.'); }
                finally { setIsLoading(false); }
            };

            const fetchHistory = (e) => {
                e.preventDefault();
                if (!studentId || !studentName) return alert('학번과 이름을 입력해야 조회가 가능해요!');
                setIsLoading(true);
                setHistoryData(null);
                
                fetch(`${GOOGLE_SCRIPT_URL}?type=history&appId=${appId}&studentId=${studentId}&studentName=${studentName}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) showToast('error', data.error);
                        else setHistoryData(data.history || []);
                    })
                    .catch(() => showToast('error', '조회 실패! 다시 시도해주세요.'))
                    .finally(() => setIsLoading(false));
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative bg-[#fdf2f8]/60 border-x border-pink-100 pb-32 shadow-xl">
                    {msg.text && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[200] w-[85%] max-w-xs animate-in slide-in-from-top duration-500">
                            <div className={`p-4 rounded-[1.5rem] text-center font-bold text-sm shadow-2xl border-2 ${msg.type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-rose-50 text-rose-700 border-rose-100'}`}>
                                {msg.text}
                            </div>
                        </div>
                    )}

                    <header className="px-8 pt-16 pb-6 text-center">
                        <div className="inline-block px-8 py-3 rounded-full bg-white shadow-sm border border-pink-100 mb-4">
                            <h1 className="text-3xl font-bold text-[#ff4d6d]">♤ {config.className || "출석 체크"} ♧</h1>
                        </div>
                    </header>

                    <main className="p-6 flex-grow overflow-y-auto">
                        {view === 'checkin' ? (
                            <div className="space-y-6">
                                <div className="soft-card p-8 text-center bg-white/50 border-white/80">
                                    <div className="text-6xl font-bold text-slate-700 mb-2 tabular-nums tracking-tighter">
                                        {currentTime.toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'})}
                                    </div>
                                    <div className="text-pink-400 text-sm font-bold tracking-[0.2em] uppercase">Attendance Clock</div>
                                </div>
                                <form onSubmit={handleCheckIn} className="space-y-4">
                                    <input className="w-full p-5 rounded-[2.5rem] border-2 border-white bg-white/80 focus:border-pink-300 outline-none font-bold text-2xl shadow-inner text-center" placeholder="학번 (30401)" value={studentId} onChange={e=>setStudentId(e.target.value)} required />
                                    <input className="w-full p-5 rounded-[2.5rem] border-2 border-white bg-white/80 focus:border-pink-300 outline-none font-bold text-2xl shadow-inner text-center" placeholder="성명" value={studentName} onChange={e=>setStudentName(e.target.value)} required />
                                    <textarea className="w-full p-5 rounded-[2.5rem] border-2 border-white bg-white/80 focus:border-pink-300 outline-none font-bold min-h-[120px] resize-none shadow-inner" placeholder="기타 사유 (지각, 조퇴 등)" value={reason} onChange={e=>setReason(e.target.value)} />
                                    <button disabled={isLoading} className="bubble-btn w-full bg-[#ff4d6d] hover:bg-[#ff758f] text-white font-bold py-6 rounded-[3rem] shadow-xl text-2xl mt-4">
                                        {isLoading ? <span className="loader scale-50"></span> : "출석 완료하기!"}
                                    </button>
                                </form>
                            </div>
                        ) : view === 'history' ? (
                            <div className="space-y-6 animate-in slide-in-from-right">
                                <h2 className="text-3xl font-bold text-[#ff4d6d] text-center">🔍 내 출석 기록</h2>
                                <form onSubmit={fetchHistory} className="soft-card p-6 space-y-4">
                                    <input className="w-full p-4 rounded-3xl border-2 border-pink-50 font-bold outline-none focus:border-pink-200 text-center text-xl" placeholder="학번" value={studentId} onChange={e=>setStudentId(e.target.value)} required />
                                    <input className="w-full p-4 rounded-3xl border-2 border-pink-50 font-bold outline-none focus:border-pink-200 text-center text-xl" placeholder="이름" value={studentName} onChange={e=>setStudentName(e.target.value)} required />
                                    <button className="w-full bg-[#ff758f] text-white font-bold py-4 rounded-3xl bubble-btn text-xl">기록 찾아보기</button>
                                </form>
                                {isLoading && <div className="text-center py-10"><span className="loader"></span></div>}
                                {historyData && (
                                    <div className="space-y-4 pb-12">
                                        {historyData.length > 0 ? historyData.map((h, i) => (
                                            <div key={i} className="soft-card p-6 border-l-[12px] border-pink-300 flex justify-between items-center transition-all hover:translate-x-1">
                                                <div>
                                                    <p className="text-xs text-slate-400 font-bold mb-1">{h.date}</p>
                                                    <p className="font-bold text-slate-700 text-2xl">{h.reason || "정상 출석 ✅"}</p>
                                                </div>
                                                <span className="text-4xl opacity-10">♤</span>
                                            </div>
                                        )) : !isLoading && <p className="text-center py-20 font-bold text-slate-400">데이터가 없어요. 학번을 확인해봐!</p>}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-5 animate-in slide-in-from-bottom">
                                <h2 className="text-xl font-bold text-[#ff4d6d] text-center">⚙️ 관리자 설정</h2>
                                <form onSubmit={handleSaveSettings} className="soft-card p-6 space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-pink-400 ml-2">클래스 이름</label>
                                        <input className="w-full p-4 border-b-2 border-pink-50 outline-none font-bold text-lg focus:border-pink-400 transition-colors" value={config.className} onChange={e=>setConfig({...config, className:e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-pink-400 ml-2">구글 폼 URL (전송용)</label>
                                        <input className="w-full p-4 border-b-2 border-pink-50 outline-none text-[10px] focus:border-pink-400" value={config.formUrl} onChange={e=>setConfig({...config, formUrl:e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-pink-600 ml-2">응답 스프레드시트 ID (조회용)</label>
                                        <input className="w-full p-4 border-b-2 border-pink-200 outline-none text-[10px] font-bold text-pink-700 bg-pink-50/30" placeholder="스프레드시트 주소창의 ID" value={config.responseSheetId} onChange={e=>setConfig({...config, responseSheetId:e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-400 ml-2">학번 entry</label>
                                            <input className="w-full p-4 border-b-2 border-pink-50 outline-none font-bold" value={config.studentIdEntry} onChange={e=>setConfig({...config, studentIdEntry:e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-400 ml-2">이름 entry</label>
                                            <input className="w-full p-4 border-b-2 border-pink-50 outline-none font-bold" value={config.nameEntry} onChange={e=>setConfig({...config, nameEntry:e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-400 ml-2">관리자 비밀번호</label>
                                        <input type="password" className="w-full p-4 border-b-2 border-pink-50 outline-none font-bold" value={config.passcode} onChange={e=>setConfig({...config, passcode:e.target.value})} />
                                    </div>
                                    <button disabled={isLoading} className="bubble-btn w-full bg-slate-700 text-white font-bold py-5 rounded-[2rem] mt-6 shadow-lg text-lg">
                                        {isLoading ? "업데이트 중..." : "설정값 저장하기"}
                                    </button>
                                </form>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-white/80 backdrop-blur-2xl border border-pink-100 flex justify-around p-4 rounded-[3.5rem] shadow-2xl z-50">
                        <button onClick={()=>setView('checkin')} className={`flex flex-col items-center gap-1 transition-all duration-300 ${view==='checkin' ? 'text-[#ff4d6d] scale-110 font-bold' : 'text-slate-300'}`}>
                            <span className="text-3xl">🐾</span><span className="text-[10px]">출석하기</span>
                        </button>
                        <button onClick={()=>setView('history')} className={`flex flex-col items-center gap-1 transition-all duration-300 ${view==='history' ? 'text-[#ff4d6d] scale-110 font-bold' : 'text-slate-300'}`}>
                            <span className="text-3xl">🔍</span><span className="text-[10px]">내 기록</span>
                        </button>
                        <button onClick={()=>{ setPassInput(''); setPassError(false); setShowPassModal(true); }} className={`flex flex-col items-center gap-1 transition-all duration-300 ${view==='settings' ? 'text-[#ff4d6d] scale-110 font-bold' : 'text-slate-300'}`}>
                            <span className="text-3xl">⚙️</span><span className="text-[10px]">환경설정</span>
                        </button>
                    </nav>

                    {showPassModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-pink-900/10 backdrop-blur-md">
                            <div className="soft-card w-full max-w-[320px] p-10 text-center animate-in zoom-in duration-300 bg-white">
                                <h3 className="text-2xl font-bold text-slate-700 mb-8 font-bold">비밀번호 확인</h3>
                                <form onSubmit={(e)=>{ e.preventDefault(); if(String(passInput).trim() === String(config.passcode).trim()){ setShowPassModal(false); setView('settings'); }else{ setPassError(true); setPassInput(''); } }}>
                                    <input type="password" autoFocus className={`w-full p-4 rounded-3xl border-2 outline-none text-center text-4xl font-bold transition-all ${passError ? 'border-rose-400 bg-rose-50 animate-shake' : 'border-pink-50'}`} value={passInput} onChange={(e)=>{setPassInput(e.target.value); setPassError(false);}} />
                                    <div className="grid grid-cols-2 gap-4 mt-8">
                                        <button type="button" onClick={()=>setShowPassModal(false)} className="p-4 rounded-2xl bg-slate-100 font-bold text-slate-500">취소</button>
                                        <button type="submit" className="p-4 rounded-2xl bg-pink-400 text-white font-bold shadow-lg hover:bg-pink-500">확인</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
